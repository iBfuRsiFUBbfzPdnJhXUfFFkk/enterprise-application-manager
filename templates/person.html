{% extends 'base_person.html' %}
{% block content %}
    <table id="data-table" class="display">
        <thead>
        <tr>
            <td>Last</td>
            <td>First</td>
            <td>Job Level</td>
            <td>Job Title</td>
            <td>Edit</td>
            <td>GitLab</td>
        </tr>
        </thead>
        <tbody>
        {% for person in people %}
            <tr>
                <td>{{ person.name_last }}</td>
                <td>{{ person.name_first }}</td>
                <td>{{ person.job_level }}</td>
                <td>{{ person.job_title }}</td>
                <td><a href="{% url 'person_edit' model_id=person.id %}">Edit</a></td>
                <td><a href="https://{{ hostname_gitlab }}/{{ person.link_gitlab_username }}" target="_blank">GitLab</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <script>
        $(document).ready(function () {
            $('#data-table').DataTable();
        });
    </script>
{% endblock %}
